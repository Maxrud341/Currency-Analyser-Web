name: Pytest Coverage

on: [pull_request, push]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build coverage file
        run: |
          python3 -m pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Update README with coverage percent
        run: |
          if [ ! -f README.md ]; then
            echo "# Project" > README.md
          fi

          pip install coverage

          python - << 'EOF'
          import xml.etree.ElementTree as ET

          tree = ET.parse('coverage.xml')
          root = tree.getroot()

          percent = float(root.attrib.get("line-rate", 0)) * 100
          percent = round(percent, 2)

          with open("README.md", "r") as f:
              lines = f.readlines()

          # remove old coverage line if exists
          lines = [l for l in lines if "Coverage:" not in l]

          lines.append(f"\nCoverage: {percent}%\n")

          with open("README.md", "w") as f:
              f.writelines(lines)
          EOF

      - name: Pytest coverage comment
        id: coverageComment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pytest-xml-coverage-path: ./coverage.xml
          title: Coverage Report
          badge-title: Coverage
          hide-badge: false
          hide-report: false
          create-new-comment: true