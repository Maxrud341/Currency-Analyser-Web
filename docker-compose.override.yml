services:
  web:
    command: ["python", "run.py"]
    build: .
    ports:
      - "5000:5000"
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/code

    restart: unless-stopped

  db:
    image: postgres:15-alpine
    env_file: .env.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
